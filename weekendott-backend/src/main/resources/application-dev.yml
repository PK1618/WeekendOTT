spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: ${DRIVER_CLASS_NAME}
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            redirect-uri: "${APP_BASE_URL:http://localhost:8080}/login/oauth2/code/google"
            scope:
              - email
              - profile

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: "true"

  # optional: helps debugging SQL
  # show-sql: true


server:
  port: 8080

aws:
  region: ${AWS_REGION}
  s3:
    bucket: ${AWS_S3_BUCKET}
app:
  frontend-url: "http://localhost:5173"
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 3600000
  admin:
    emails: ${ADMIN_EMAILS}
  cookie:
    secure: "false"
logging:
  level:
    org.pk0918.weekendott: DEBUG